name: FF14 News Bot
on:
  schedule:
    - cron: '0 9,12,18 * * *' # 朝9時、昼12時、夕方18時にチェック
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 👈 【超重要】GitHubにファイルを書き込む許可
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with: {python-version: '3.9'}
      - run: pip install requests feedparser # 必要なツールをインストール
      - run: python ff14_bot.py
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
      # 更新された last_link.txt をGitHubに保存する
      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add last_link.txt
          # もしファイルに変更があったらコミットする
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update last link" && git push)
