name: Chiikawa Info Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22,1,4,7,10 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: pip install requests beautifulsoup4
      - run: python chiikawa_bot.py
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # ファイルがあれば追加、なければ無視する魔法のコマンド
          git add last_chiikawa.txt || true
          # 変更がある場合のみコミットする
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update chiikawa info" && git push)
