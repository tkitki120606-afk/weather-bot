name: Chiikawa Info Bot
on:
  schedule:
    - cron: '0 22,1,4,7,10 * * *' # 日本時間 7,10,13,16,19時に実行
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.9'}
      # BeautifulSoupを入れるのを忘れずに！
      - run: pip install requests beautifulsoup4
      - run: python chiikawa_bot.py
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add last_chiikawa.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update last chiikawa info" && git push)
