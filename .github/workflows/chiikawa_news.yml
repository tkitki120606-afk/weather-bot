# 変更点: beautifulsoup4 を feedparser に変更
      - run: pip install requests feedparser
      - run: python chiikawa_bot.py
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # ファイルがあれば追加
          git add last_chiikawa_*.txt || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update chiikawa links" && git push)
